name: Update Drive index

on:
  workflow_dispatch:
  schedule:
    # 20:00 UTC = 04:00 HKT on the following day
    - cron: "0 20 * * *"

permissions:
  contents: write

concurrency:
  group: update-drive-index
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Drive client
        run: python -m pip install --disable-pip-version-check google-api-python-client google-auth

      - name: Build curated index
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/update_drive_index.py

      - name: Publish index change
        run: |
          git add resources.json
          if git diff --cached --quiet; then
            echo "Drive index is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update Drive resource index"
          git push
